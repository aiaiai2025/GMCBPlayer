    btn.disabled = !enabled;
    syncShowReady(btn);
    // Auto mode: start playing as soon as the next song finishes loading
    if (enabled && pendingAutoPlay) {
        pendingAutoPlay = false;
        if (isVampSong) startVampSongPlayback();
        else            startPlayback();
    }
}

// Apply / remove the show-ready glow: pulses green in Show mode when cued & waiting.
// Auto mode skips the glow because playback starts automatically — no human press needed.
function syncShowReady(btn) {
    if (!btn) btn = document.getElementById('playBtn');
    if (!btn) return;
    const ready = (playMode === 'show' || playMode === 'showcues') && !isPlaying && !btn.disabled
                  && !!currentSong && !!instrBuffer && vampPhase !== 'vamp';
    btn.classList.toggle('show-ready', ready);
}

function setStatus(msg) {
    const el = document.getElementById('statusBar');
    if (el) el.textContent = msg;
}

function toggleLoop() {
    loopRegion = !loopRegion;
    const btn = document.getElementById('loopBtn');
    if (btn) btn.classList.toggle('loop-active', loopRegion);
}

function setTransportLocked(locked) {
    ['tempoSection', 'pitchSection'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('locked', locked);
    });
}

function updateScrubFill() {
    const el = document.getElementById('scrubBar');
    if (!el) return;
    const pct = (parseFloat(el.value) / 1000 * 100).toFixed(1);
    el.style.background = `linear-gradient(to right, #2c5f9e ${pct}%, #333 ${pct}%)`;
}

function updateVocalFill() {
    const el = document.getElementById('vocalSlider');
    if (!el) return;
    el.style.background = `linear-gradient(to right, #e0932a ${vocalLevel}%, #333 ${vocalLevel}%)`;
}

function updateTempoFill() {
    const el = document.getElementById('tempoSlider');
    if (!el) return;
    const pct = ((tempoRatio * 100 - 75) / 50 * 100).toFixed(1);
    if (tempoRatio >= 1.0) {
        el.style.background = `linear-gradient(to right, #333 50%, #2a7a76 50%, #4ecdc4 ${pct}%, #333 ${pct}%)`;
    } else {
        el.style.background = `linear-gradient(to right, #333 ${pct}%, #4ecdc4 ${pct}%, #2a7a76 50%, #333 50%)`;
    }
}

function updatePitchFill() {
    const el = document.getElementById('pitchSlider');
    if (!el) return;
    // Range is -5 to +5; center (0) maps to 50%
    const pct = ((pitchSemitones + 5) / 10 * 100).toFixed(1);
    if (pitchSemitones > 0) {
        el.style.background = `linear-gradient(to right, #333 50%, #6d28d9 50%, #a78bfa ${pct}%, #333 ${pct}%)`;
    } else if (pitchSemitones < 0) {
        el.style.background = `linear-gradient(to right, #333 ${pct}%, #a78bfa ${pct}%, #6d28d9 50%, #333 50%)`;
    } else {
        el.style.background = `linear-gradient(to right, #333 50%, #333 50%)`;
    }
}

function updatePresetButtons() {
    const vPresets = { 'Off':0, 'Low':15, 'Mid':50, 'Full':100 };
    const tPresets = { '90%':90, '95%':95, '100%':100, '105%':105 };
    const pPresets = { '−4':-4, '−2':-2, '0':0, '+2':2, '+4':4 };
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.remove('active-preset-vocal','active-preset-tempo','active-preset-pitch');
        const txt = btn.textContent;
        if (vPresets[txt] !== undefined && vPresets[txt] === vocalLevel)                  btn.classList.add('active-preset-vocal');
        if (tPresets[txt] !== undefined && tPresets[txt] === Math.round(tempoRatio*100))  btn.classList.add('active-preset-tempo');
        if (pPresets[txt] !== undefined && pPresets[txt] === pitchSemitones)              btn.classList.add('active-preset-pitch');
    });
}

function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

// Sync all slider DOM elements and value labels to the current JS state vars.
// Call this after applySongSettings() whenever we need to update the UI
// without doing a full renderPlayer() (e.g. on playlist switch).
function syncSlidersToCurrentSettings() {
    const tempoVal  = Math.round(tempoRatio * 100);
    const pitchSign = pitchSemitones > 0 ? '+' : (pitchSemitones < 0 ? '−' : '');

    const vSlider = document.getElementById('vocalSlider');
    const tSlider = document.getElementById('tempoSlider');
    const pSlider = document.getElementById('pitchSlider');
    if (vSlider) vSlider.value = vocalLevel;
    if (tSlider) tSlider.value = tempoVal;
    if (pSlider) pSlider.value = pitchSemitones;

    const vVal = document.getElementById('vocalValue');
    const tVal = document.getElementById('tempoValue');
    const pVal = document.getElementById('pitchValue');
    if (vVal) vVal.textContent = vocalLevel + '%';
    if (tVal) tVal.textContent = tempoVal + '%';
    if (pVal) pVal.textContent = pitchSign + Math.abs(pitchSemitones);

    updateVocalFill();
    updateTempoFill();
    updatePitchFill();
    updatePresetButtons();
    updateSettingsIndicator();
    updateSaveSettingsBtn();
    updateRegionBar();
    updateRegionDisplay();
}

// ══════════════════════════════════════════════════════════════════════════════
// Playback mode: Rehearsal · Show · Auto
// ══════════════════════════════════════════════════════════════════════════════
function loadShowMode() {
    try {
        const stored = localStorage.getItem(SHOW_MODE_KEY);
        // Migrate old boolean value ('1' = show mode)
        if      (stored === '1' || stored === 'show') playMode = 'show';
        else if (stored === 'auto')                   playMode = 'auto';
        else if (stored === 'showcues')               playMode = 'showcues';
        else                                          playMode = 'rehearsal';
    } catch(e) { playMode = 'rehearsal'; }
    applyShowModeUI();
}

function setPlayMode(mode) {
    playMode = mode;
    try { localStorage.setItem(SHOW_MODE_KEY, mode); } catch(e) {}
    applyShowModeUI();
    renderSongList();   // cues appear/disappear based on showcues mode
    updateShowCounter();
    syncShowReady();
    triggerPrefetch();
    updateDurationThermometer();
}

function applyShowModeUI() {
    document.querySelectorAll('.mode-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.mode === playMode);
    });
}

// Returns the ordered display list for the current playlist / All Songs view
function currentDisplayList() {
    const allSongs = libraryOrder.filter(n => library[n] && library[n].instr);
    // Show W/Cues: all entries (songs + cues) in JSON/script order
    if (playMode === 'showcues') {
        return libraryOrder.filter(n => library[n]);
    }
    if (activePlaylist !== 'all' && playlists[activePlaylist]) {
        const pl = playlists[activePlaylist].filter(s => library[s]);
        return pl.length ? pl : allSongs;
    }
    return allSongs;
}

function goPrevSong() {
    const list = currentDisplayList();
    const idx = list.indexOf(currentSong);
    if (idx > 0) {
        stopAndRewind();
        selectSong(list[idx - 1]);
    }
}

function goNextSong() {
    const list = currentDisplayList();
    const idx = list.indexOf(currentSong);
    if (idx >= 0 && idx < list.length - 1) {
        stopAndRewind();
        selectSong(list[idx + 1]);
    }
}

function autoCueNext() {
    if (playMode === 'rehearsal' || !currentSong) return;
    const list = currentDisplayList();
    const idx  = list.indexOf(currentSong);
    if (idx !== -1 && idx < list.length - 1) {
        if (playMode === 'auto') pendingAutoPlay = true;  // showcues always waits for play press
        selectSong(list[idx + 1]);
    } else {
        setStatus('End of set list');
    }
}

function updateShowCounter() {
    const el = document.getElementById('showCounter');
    if (!el) return;
    if (playMode === 'rehearsal' || !currentSong) { el.textContent = ''; el.className = 'show-counter'; return; }
    const list = currentDisplayList();
    const idx  = list.indexOf(currentSong);
    const label = playMode === 'showcues' ? 'Track' : 'Song';
    el.textContent = idx !== -1 ? `${label} ${idx + 1} of ${list.length}` : '';
    el.className = 'show-counter' + (playMode === 'auto' ? ' mode-auto' : '') + (playMode === 'showcues' ? ' mode-showcues' : '');
}

// ══════════════════════════════════════════════════════════════════════════════
// Playlist duration thermometer (v2.10)
// ══════════════════════════════════════════════════════════════════════════════

// Lightweight: uses <audio> metadata — does NOT download the full audio file.
function getAudioDuration(url) {
    return new Promise(resolve => {
        const a = new Audio();
        a.addEventListener('loadedmetadata', () => resolve(isFinite(a.duration) ? a.duration : null), { once: true });
        a.addEventListener('error', () => resolve(null), { once: true });
        a.preload = 'metadata';
        a.src = url;
    });
}

// Fetch durations for a list of song names, batched 5 at a time.
// Results land in songDurations[name] = seconds.
// For vamp songs, sums pt1 + vamp + pt2 (one loop of vamp).
async function prefetchDurations(songList) {
    const BATCH = 5;
    for (let i = 0; i < songList.length; i += BATCH) {
        const batch = songList.slice(i, i + BATCH);
        await Promise.all(batch.map(async name => {
            if (songDurations[name] !== undefined) return;   // already cached
            const entry = library[name];
            if (!entry) return;
            try {
                if (entry.type === 'cue') {
                    const d = await getAudioDuration(entry.src);
                    songDurations[name] = d || 0;
                } else if (entry.vamp && entry.postVamp) {
                    // Vamp song: sum the three sections
                    const [d1, dv, d2] = await Promise.all([
                        getAudioDuration(entry.instr),
                        getAudioDuration(entry.vamp.instr),
                        getAudioDuration(entry.postVamp.instr)
                    ]);
                    songDurations[name] = (d1 || 0) + (dv || 0) + (d2 || 0);
                } else {
                    const d = await getAudioDuration(entry.instr);
                    songDurations[name] = d || 0;
                }
            } catch(e) {
                songDurations[name] = 0;
            }
            // Update progressively as results arrive
            updateDurationThermometer();
            updateSidebarDuration();
        }));
    }
}

// Kick off a prefetch for the current display list (no-op in Rehearsal mode).
function triggerPrefetch() {
    if (playMode === 'rehearsal') return;
    prefetchDurations(currentDisplayList());
}

// Returns stats for the current display list based on cached durations.
function getPlaylistStats() {
    const list      = currentDisplayList();
    const curIdx    = currentSong ? list.indexOf(currentSong) : -1;
    let totalSec    = 0;
    let elapsedSec  = 0;
    let knownCount  = 0;

    for (let i = 0; i < list.length; i++) {
        const dur = songDurations[list[i]];
        if (dur !== undefined && dur > 0) {
            knownCount++;
            totalSec  += dur;
            // Songs fully played before the current one
            if (curIdx > i) elapsedSec += dur;
        }
    }

    // Add current song's in-song progress
    if (curIdx !== -1 && instrBuffer) {
        const inSong = isPlaying ? getCurrentOriginalTime() : startOffset;
        elapsedSec  += Math.min(Math.max(0, inSong), instrBuffer.duration);
    }

    return { totalSec, elapsedSec, knownCount, totalCount: list.length,
             allKnown: knownCount === list.length };
}

// Update the playlist progress label in the player.
function updateDurationThermometer() {
    const wrapper = document.getElementById('durationThermometer');
    if (!wrapper) return;

    if (playMode === 'rehearsal') { wrapper.style.display = 'none'; return; }
    wrapper.style.display = '';

    const label = document.getElementById('thermometerLabel');
    if (!label) return;

    const stats = getPlaylistStats();

    if (stats.knownCount === 0) {
        label.textContent = 'Playlist Progress —';
        label.className = 'thermometer-label loading';
        return;
    }

    const totalStr   = formatTime(stats.totalSec);
    const elapsedStr = formatTime(stats.elapsedSec);
    const pending    = stats.allKnown ? '' : ` (${stats.knownCount}/${stats.totalCount} songs)`;
    label.textContent = `Playlist Progress  ${elapsedStr} / ${totalStr}${pending}`;
    label.className = 'thermometer-label';
}

// Throttle thermometer updates during animation frames (~1×/sec is plenty).
function maybeUpdateThermometer() {
    if (playMode === 'rehearsal') return;
    const now = Date.now();
    if (now - _thermometerLastUpdate >= 800) {
        _thermometerLastUpdate = now;
        updateDurationThermometer();
    }
}

// Update the sidebar manifest-status text to show total duration.
function updateSidebarDuration() {
    const el = document.getElementById('manifestStatus');
    if (!el) return;
    const list     = Object.keys(library).filter(n => library[n].instr);
    const allKnown = list.every(n => songDurations[n] !== undefined);
    if (!allKnown) return;   // wait until all songs have been measured
    const total   = list.reduce((s, n) => s + (songDurations[n] || 0), 0);
    const count   = list.length;
    el.textContent = `${count} song${count === 1 ? '' : 's'} · ${formatTime(total)}`;
}

// ══════════════════════════════════════════════════════════════════════════════
// Keyboard shortcuts
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    if (!currentSong || !instrBuffer) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'Escape') { stopAndRewind(); return; }
    // Vocal nudge works even during a vamp loop — emergency rescue if a singer gets lost
    if (e.key === '-' || e.key === '_') { e.preventDefault(); nudgeVocalLevel(-30); return; }
    if (e.key === '=' || e.key === '+') { e.preventDefault(); nudgeVocalLevel(+30); return; }
    if (vampPhase === 'vamp') return;   // no play/seek shortcuts during vamp loop
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowLeft'  && !isVampSong) { e.preventDefault(); seekToFraction(Math.max(0, (getCurrentOriginalTime()-5)/instrBuffer.duration)); }
    else if (e.key === 'ArrowRight' && !isVampSong) { e.preventDefault(); seekToFraction(Math.min(1, (getCurrentOriginalTime()+5)/instrBuffer.duration)); }
    else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); goNextSong(); }
    else if (e.key === 'b' || e.key === 'B') { e.preventDefault(); goPrevSong(); }
    else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); seekToFraction(0); }
});

// ══════════════════════════════════════════════════════════════════════════════
// Per-playlist saved settings
// ══════════════════════════════════════════════════════════════════════════════
function loadPlaylistSettings() {
    try {
        const stored = localStorage.getItem(PLAYLIST_SETTINGS_KEY);
        playlistSettings = stored ? JSON.parse(stored) : {};
    } catch(e) { playlistSettings = {}; }
}

function savePlaylistSettings() {
    localStorage.setItem(PLAYLIST_SETTINGS_KEY, JSON.stringify(playlistSettings));
}

function hasSavedSettings(playlistName, songName) {
    return !!(playlistSettings[playlistName] && playlistSettings[playlistName][songName]);
}

// Reset sliders to defaults, then overlay any saved settings for the active playlist.
// Called every time a new song is selected.
function applySongSettings(songName) {
    // 1. Reset to defaults
    tempoRatio     = 1.0;
    pitchSemitones = 0;
    vocalLevel     = 100;
    lastProcessedTempo = null;
    lastProcessedPitch = null;
    regionInFrac   = 0;
    regionOutFrac  = 1;

    // 2. Saved playlist settings take priority — apply and stop if found
    if (activePlaylist !== 'all' && hasSavedSettings(activePlaylist, songName)) {
        const s = playlistSettings[activePlaylist][songName];
        if (s.tempo     !== undefined) tempoRatio     = s.tempo / 100;
        if (s.pitch     !== undefined) pitchSemitones = s.pitch;
        if (s.vocal     !== undefined) vocalLevel     = s.vocal;
        if (s.regionIn  !== undefined) regionInFrac   = s.regionIn;
        if (s.regionOut !== undefined) regionOutFrac  = s.regionOut;
        return;  // saved settings win — don't apply session memory on top
    }

    // 3. Fall back to per-playlist session memory (unsaved in-session changes)
    const mem = sessionMemory[sessionKey(activePlaylist, songName)];
    if (mem) {
        if (mem.tempo     !== undefined) tempoRatio     = mem.tempo / 100;
        if (mem.pitch     !== undefined) pitchSemitones = mem.pitch;
        if (mem.vocal     !== undefined) vocalLevel     = mem.vocal;
        if (mem.regionIn  !== undefined) regionInFrac   = mem.regionIn;
        if (mem.regionOut !== undefined) regionOutFrac  = mem.regionOut;
    }
}

function saveCurrentSongSettings() {
    if (activePlaylist === 'all' || !currentSong) return;
    playlistSettings[activePlaylist]             = playlistSettings[activePlaylist] || {};
    playlistSettings[activePlaylist][currentSong] = {
        tempo:     Math.round(tempoRatio * 100),
        pitch:     pitchSemitones,
        vocal:     vocalLevel,
        regionIn:  regionInFrac,
        regionOut: regionOutFrac,
    };
    savePlaylistSettings();
    updateSaveSettingsBtn();
    renderSongList();   // refresh dot indicators
    setStatus('Settings saved to "' + activePlaylist + '"');
    setTimeout(() => setStatus(''), 2500);
}

// Auto-save: called on every slider/preset/region change so settings survive a refresh
// without requiring the explicit 💾 button. The 💾 button remains for clarity but is
// now redundant once any adjustment has been made.
function autoSaveCurrentSongSettings() {
    if (activePlaylist === 'all' || !currentSong) return;
    const firstSave = !hasSavedSettings(activePlaylist, currentSong);
    playlistSettings[activePlaylist]             = playlistSettings[activePlaylist] || {};
    playlistSettings[activePlaylist][currentSong] = {
        tempo:     Math.round(tempoRatio * 100),
        pitch:     pitchSemitones,
        vocal:     vocalLevel,
        regionIn:  regionInFrac,
        regionOut: regionOutFrac,
    };
    savePlaylistSettings();
    updateSaveSettingsBtn();
    if (firstSave) renderSongList();   // show dot indicator on first save only
}

function clearCurrentSongSettings() {
    if (activePlaylist === 'all' || !currentSong) return;
    if (playlistSettings[activePlaylist]) {
        delete playlistSettings[activePlaylist][currentSong];
        if (Object.keys(playlistSettings[activePlaylist]).length === 0) {
            delete playlistSettings[activePlaylist];
        }
    }
    savePlaylistSettings();
    updateSaveSettingsBtn();
    renderSongList();
    setStatus('Saved settings cleared');
    setTimeout(() => setStatus(''), 2000);
}

function updateSaveSettingsBtn() {
    const btn      = document.getElementById('saveSettingsBtn');
    const clearBtn = document.getElementById('clearSettingsBtn');
    if (!btn) return;
    // Hide entirely when not in a named playlist — can't save to "All Songs"
    if (activePlaylist === 'all' || !currentSong) {
        btn.style.display = 'none';
        if (clearBtn) clearBtn.style.display = 'none';
        return;
    }
    btn.style.display = '';
    const saved = hasSavedSettings(activePlaylist, currentSong);
    if (saved) {
        btn.textContent = '✓ Auto-saved  ·  ' + activePlaylist;
        btn.classList.add('is-saved');
        if (clearBtn) clearBtn.style.display = '';
    } else {
        btn.textContent = '💾 Save settings to "' + activePlaylist + '"';
        btn.classList.remove('is-saved');
        if (clearBtn) clearBtn.style.display = 'none';
    }
}

// ══════════════════════════════════════════════════════════════════════════════
// Playlists — stored in localStorage
// ══════════════════════════════════════════════════════════════════════════════
let playlists          = {};
let activePlaylist     = 'all';
let isEditingPlaylist  = false;
let editingPlaylistName = null;   // null = new playlist, string = editing existing

const PLAYLISTS_KEY = 'stemplayer_playlists_' + _storageNS;

function loadPlaylists() {
    try {
        const stored = localStorage.getItem(PLAYLISTS_KEY);
        playlists = stored ? JSON.parse(stored) : {};
    } catch(e) { playlists = {}; }
}

function savePlaylists() {
    localStorage.setItem(PLAYLISTS_KEY, JSON.stringify(playlists));
}

function renderPlaylistBar() {
    const sel = document.getElementById('playlistSelect');
    if (!sel) return;
    const prev = sel.value;
    sel.innerHTML = '<option value="all">All Songs</option>';
    Object.keys(playlists).sort().forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
    });
    if (prev && (prev === 'all' || playlists[prev])) {
        sel.value = prev;
        activePlaylist = sel.value;
    } else {
        sel.value = 'all';
        activePlaylist = 'all';
    }
    const isPlaylist = sel.value !== 'all';
    document.getElementById('editPlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
    document.getElementById('deletePlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
}

function onPlaylistSelect(value) {
    // Snapshot current settings into session memory for the OLD playlist context
    if (currentSong) {
        sessionMemory[sessionKey(activePlaylist, currentSong)] = {
            tempo:     Math.round(tempoRatio * 100),
            pitch:     pitchSemitones,
            vocal:     vocalLevel,
            regionIn:  regionInFrac,
            regionOut: regionOutFrac,
        };
    }
    activePlaylist = value;
    const isPlaylist = value !== 'all';
    document.getElementById('editPlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
    document.getElementById('deletePlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
    // Re-apply settings for the now-active playlist (saved settings win over session memory)
    if (currentSong) {
        applySongSettings(currentSong);
        syncSlidersToCurrentSettings();
    }
    renderSongList();
    triggerPrefetch();
    updateDurationThermometer();
}

function startNewPlaylist() {
    editingPlaylistName = null;
    isEditingPlaylist = true;
    const nameInput = document.getElementById('playlistNameInput');
    if (nameInput) nameInput.value = '';
    document.getElementById('playlistEditBar').style.display = 'flex';
    nameInput?.focus();
    renderSongList();
}

function startEditPlaylist() {
    if (activePlaylist === 'all') return;
    editingPlaylistName = activePlaylist;
    isEditingPlaylist = true;
    const nameInput = document.getElementById('playlistNameInput');
    if (nameInput) nameInput.value = activePlaylist;
    document.getElementById('playlistEditBar').style.display = 'flex';
    renderSongList();
}

function cancelEditPlaylist() {
    isEditingPlaylist = false;
    editingPlaylistName = null;
    document.getElementById('playlistEditBar').style.display = 'none';
    renderSongList();
}

function confirmSavePlaylist() {
    const nameInput = document.getElementById('playlistNameInput');
    const name = nameInput ? nameInput.value.trim() : '';
    if (!name) { nameInput?.focus(); return; }
    // Collect in current DOM order (respects drag reordering), checked items only
    const checked = Array.from(document.querySelectorAll('.song-item.playlist-check'))
        .filter(el => el.querySelector('input')?.checked)
        .map(el => el.dataset.song);
    if (editingPlaylistName && editingPlaylistName !== name) delete playlists[editingPlaylistName];
    playlists[name] = checked;
    savePlaylists();
    isEditingPlaylist = false;
    editingPlaylistName = null;
    document.getElementById('playlistEditBar').style.display = 'none';
    renderPlaylistBar();
    const sel = document.getElementById('playlistSelect');
    if (sel) { sel.value = name; }
    activePlaylist = name;   // must be set AFTER renderPlaylistBar() resets it
    const isPlaylist = name !== 'all';
    document.getElementById('editPlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
    document.getElementById('deletePlaylistBtn')?.classList.toggle('hidden', !isPlaylist);
    renderSongList();
}

function deleteActivePlaylist() {
    if (activePlaylist === 'all') return;
    if (!confirm(`Delete playlist "${activePlaylist}"?`)) return;
    delete playlists[activePlaylist];
    savePlaylists();
    activePlaylist = 'all';
    renderPlaylistBar();
    renderSongList();
}

function exportPlaylists() {
    const data = { playlists, settings: playlistSettings };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'playlists.json'; a.click();
    URL.revokeObjectURL(url);
}

function importPlaylists() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = evt => {
            try {
                const imported = JSON.parse(evt.target.result);
                if (typeof imported !== 'object' || Array.isArray(imported)) {
                    alert('Invalid playlists file.'); return;
                }
                // Support both old format { playlistName: [...] }
                // and new format { playlists: {...}, settings: {...} }
                const importedPlaylists = imported.playlists || imported;
                const importedSettings  = imported.settings  || {};
                playlists = { ...playlists, ...importedPlaylists };
                Object.keys(importedSettings).forEach(pl => {
                    playlistSettings[pl] = { ...(playlistSettings[pl] || {}), ...importedSettings[pl] };
                });
                savePlaylists();
                savePlaylistSettings();
                renderPlaylistBar();
                renderSongList();
            } catch(e) { alert('Could not read file.'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ══════════════════════════════════════════════════════════════════════════════
// Drag-to-reorder (playlist edit mode)
// ══════════════════════════════════════════════════════════════════════════════
let dragSrcEl  = null;

// ── HTML5 mouse drag ─────────────────────────────────────────────────────────
function onDragStart(e) {
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => this.classList.add('dragging'), 0);
}

function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (this === dragSrcEl) return;
    this.classList.remove('drag-over-top', 'drag-over-bottom');
    const mid = this.getBoundingClientRect().top + this.getBoundingClientRect().height / 2;
    this.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}

function onDragLeave() {
    this.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onDrop(e) {
    e.preventDefault();
    if (!dragSrcEl || dragSrcEl === this) return;
    const mid = this.getBoundingClientRect().top + this.getBoundingClientRect().height / 2;
    if (e.clientY < mid) {
        this.parentNode.insertBefore(dragSrcEl, this);
    } else {
        this.parentNode.insertBefore(dragSrcEl, this.nextSibling);
    }
    this.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.song-item').forEach(el =>
        el.classList.remove('drag-over-top', 'drag-over-bottom')
    );
    dragSrcEl = null;
}

// ── Touch drag (mobile) ──────────────────────────────────────────────────────
let touchDragEl   = null;
let touchLastOver = null;

function onTouchDragStart(e) {
    e.preventDefault();
    touchDragEl = this.closest('.song-item');
    touchDragEl.classList.add('dragging');
    document.addEventListener('touchmove',  onTouchDragMove,  { passive: false });
    document.addEventListener('touchend',   onTouchDragEnd);
    document.addEventListener('touchcancel',onTouchDragEnd);
}

function onTouchDragMove(e) {
    if (!touchDragEl) return;
    e.preventDefault();
    const touch = e.touches[0];
    touchDragEl.style.display = 'none';
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDragEl.style.display = '';
    const target = elBelow?.closest('.song-item.playlist-check');
    if (touchLastOver && touchLastOver !== target) {
        touchLastOver.classList.remove('drag-over-top', 'drag-over-bottom');
    }
    if (target && target !== touchDragEl) {
        const rect = target.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        target.classList.remove('drag-over-top', 'drag-over-bottom');
        target.classList.add(touch.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
        touchLastOver = target;
        if (touch.clientY < mid) {
            target.parentNode.insertBefore(touchDragEl, target);
        } else {
            target.parentNode.insertBefore(touchDragEl, target.nextSibling);
        }
    }
}

function onTouchDragEnd() {
    if (!touchDragEl) return;
    touchDragEl.classList.remove('dragging');
    document.querySelectorAll('.song-item').forEach(el =>
        el.classList.remove('drag-over-top', 'drag-over-bottom')
    );
    touchDragEl  = null;
    touchLastOver = null;
    document.removeEventListener('touchmove',   onTouchDragMove);
    document.removeEventListener('touchend',    onTouchDragEnd);
    document.removeEventListener('touchcancel', onTouchDragEnd);
}

// ══════════════════════════════════════════════════════════════════════════════
// Mobile sidebar toggle
// ══════════════════════════════════════════════════════════════════════════════
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const bd = document.getElementById('sidebarBackdrop');
    if (!sb || !bd) return;
    const isOpen = sb.classList.contains('open');
    isOpen ? closeSidebar() : openSidebar();
}
function openSidebar() {
    document.getElementById('sidebar')?.classList.add('open');
    document.getElementById('sidebarBackdrop')?.classList.add('open');
}
function closeSidebar() {
    document.getElementById('sidebar')?.classList.remove('open');
    document.getElementById('sidebarBackdrop')?.classList.remove('open');
}

// ══════════════════════════════════════════════════════════════════════════════
// Online / offline indicator
// ══════════════════════════════════════════════════════════════════════════════
function updateNetworkBadge() {
    const badge = document.getElementById('cacheBadge');
    if (!badge) return;
    if (!navigator.onLine) {
        badge.textContent = 'Offline';
        badge.className = 'cache-badge offline';
    } else if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        badge.textContent = 'Cached';
        badge.className = 'cache-badge cached';
    } else {
        badge.textContent = '';
        badge.className = 'cache-badge';
    }
}
window.addEventListener('online',  updateNetworkBadge);
window.addEventListener('offline', updateNetworkBadge);

// ══════════════════════════════════════════════════════════════════════════════
// Service Worker registration
// ══════════════════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        // When a new SW takes over, update the badge
        reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') updateNetworkBadge();
            });
        });
        // If there's already a controller, mark as cached immediately
        if (navigator.serviceWorker.controller) updateNetworkBadge();
        // When controller changes (first activation), update badge
        navigator.serviceWorker.addEventListener('controllerchange', updateNetworkBadge);
    }).catch(err => console.warn('SW registration failed:', err));
}

// ══════════════════════════════════════════════════════════════════════════════
// Boot — load the manifest as soon as the page is ready
// ══════════════════════════════════════════════════════════════════════════════
loadPlaylists();
loadPlaylistSettings();
renderPlaylistBar();
loadShowMode();
loadManifest();

</script>
