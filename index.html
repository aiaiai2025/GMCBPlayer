<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="aandGo">
    <title>aandGo 2.19</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #1c1c1e;
            color: #d0d0d0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #111;
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            color: #888;
        }
        header .version {
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            background: #161618;
            border-right: 1px solid #2c2c2e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-top {
            padding: 14px 12px;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .load-btn {
            padding: 9px 12px;
            background: #2c5f9e;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            text-align: center;
            transition: background 0.15s;
        }
        .load-btn:hover { background: #3a72b8; }
        .load-btn:active { background: #244e88; }

        .load-hint {
            font-size: 11px;
            color: #555;
            text-align: center;
            line-height: 1.4;
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-track { background: transparent; }
        .song-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .song-item {
            padding: 11px 14px;
            cursor: pointer;
            font-size: 13px;
            border-left: 3px solid transparent;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.1s, color 0.1s;
            user-select: none;
        }
        .song-item:hover { background: #222; color: #ddd; }
        .song-item.active {
            background: #1a3a5c;
            border-left-color: #2c5f9e;
            color: #fff;
        }
        .song-item.loading-item {
            color: #555;
            font-style: italic;
        }

        .empty-list {
            padding: 20px 14px;
            color: #444;
            font-size: 12px;
            line-height: 1.6;
        }

        /* ── Player Area ── */
        .player {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 60px;
            gap: 30px;
        }

        .idle-message {
            color: #444;
            font-size: 15px;
            text-align: center;
            line-height: 1.8;
        }

        /* Status overlay */
        .status-bar {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            height: 16px;
            text-align: center;
        }

        /* Song title */
        .song-title {
            font-size: 26px;
            font-weight: 300;
            color: #fff;
            text-align: center;
            letter-spacing: 0.3px;
            max-width: 600px;
        }

        /* Scrub bar */
        .scrub-section {
            width: 100%;
            max-width: 580px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
            margin-bottom: 9px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #333;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

        #scrubBar::-webkit-slider-thumb { background: #5a9ae0; }
        #scrubBar { background: linear-gradient(to right, #2c5f9e 0%, #333 0%); }

        /* Transport */
        .transport {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .btn-stop {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .btn-stop:hover { background: #3a3a3c; color: #fff; }

        .btn-next {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .btn-next:hover { background: #3a3a3c; color: #fff; }
        .btn-next:disabled { opacity: 0.3; cursor: default; }

        .btn-prev {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .btn-prev:hover { background: #3a3a3c; color: #fff; }
        .btn-prev:disabled { opacity: 0.3; cursor: default; }

        .btn-play {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #2c5f9e;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            box-shadow: 0 4px 16px rgba(44, 95, 158, 0.4);
        }
        .btn-play:hover { background: #3a72b8; }
        .btn-play:active { background: #244e88; }
        .btn-play:disabled { background: #333; box-shadow: none; cursor: default; }

        .btn-loop {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #555;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .btn-loop:hover { background: #3a3a3c; color: #aaa; }
        .btn-loop.loop-active {
            background: #0d2a1a;
            border-color: #34d399;
            color: #34d399;
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.25);
        }

        /* Controls row */
        .controls-row {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 920px;
        }

        /* Shared control section */
        .control-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .section-label {
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #555;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .slider-end-label {
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            width: 28px;
        }
        .slider-end-label.right { text-align: right; }

        #vocalSlider::-webkit-slider-thumb { background: #e0932a; }
        #vocalSlider { background: linear-gradient(to right, #e0932a 100%, #333 100%); }

        #tempoSlider::-webkit-slider-thumb { background: #4ecdc4; }
        #tempoSlider { background: linear-gradient(to right, #2a7a76 50%, #333 50%); }

        #pitchSlider::-webkit-slider-thumb { background: #a78bfa; }
        #pitchSlider { background: linear-gradient(to right, #333 50%, #6d28d9 50%); }

        .control-value {
            font-size: 12px;
            color: #888;
            width: 38px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        /* Preset buttons */
        .preset-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preset-btn {
            padding: 4px 9px;
            border-radius: 12px;
            border: 1px solid #333;
            background: transparent;
            color: #666;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .preset-btn:hover { border-color: #555; color: #aaa; }
        .preset-btn.active-preset-vocal  { border-color: #e0932a; color: #e0932a; }
        .preset-btn.active-preset-tempo  { border-color: #4ecdc4; color: #4ecdc4; }
        .preset-btn.active-preset-pitch  { border-color: #a78bfa; color: #a78bfa; }

        /* Locked state — tempo & pitch greyed out during playback */
        .control-section.locked { opacity: 0.35; pointer-events: none; }
        .control-section.locked .section-label::after {
            content: ' — locked during playback';
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* Divider between control sections */
        .controls-divider {
            width: 1px;
            background: #2c2c2e;
            align-self: stretch;
            margin-top: 18px;
        }

        /* ── Loop Region — two separate rows, no overlay tricks ── */
        /* ── Loop region — single bar with draggable dot markers ── */
        .region-section {
            width: 100%;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .region-bar-wrap {
            position: relative;
            width: 100%;
            height: 24px;
            display: flex;
            align-items: center;
            cursor: crosshair;
        }

        .region-bar-track {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #333;
            pointer-events: none;
        }

        .region-dot {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.75);
            cursor: grab;
            pointer-events: all;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .region-dot.grabbing { cursor: grabbing; transform: translate(-50%, -50%) scale(1.2); }
        .region-dot-in  { background: #34d399; left: 0%; }
        .region-dot-out { background: #f87171; left: 100%; }

        .region-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .region-time-in  { font-size: 10px; font-variant-numeric: tabular-nums; color: #34d399; flex-shrink: 0; }
        .region-time-out { font-size: 10px; font-variant-numeric: tabular-nums; color: #f87171; flex-shrink: 0; }
        .region-time-in.dim  { color: #444; }
        .region-time-out.dim { color: #444; }

        .region-label {
            color: #444;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }
        .region-label.active { color: #777; }

        .region-clear-btn {
            padding: 3px 9px;
            border-radius: 10px;
            border: 1px solid #333;
            background: transparent;
            color: #555;
            font-size: 9px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .region-clear-btn:hover { border-color: #666; color: #999; }


        /* ── Sidebar show title ── */
        .show-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            text-align: center;
            padding: 4px 0 2px;
        }
        .manifest-status {
            font-size: 11px;
            color: #ccc;
            text-align: center;
            min-height: 14px;
        }
        .manifest-error {
            color: #f87171;
        }

        /* ════════════════════════════════════════════════════
           Mobile-menu button — hidden on desktop
        ════════════════════════════════════════════════════ */
        .mobile-menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            background: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .mobile-menu-btn:hover { background: #2c2c2e; color: #ddd; }

        /* Backdrop (mobile only) */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 99;
        }
        .sidebar-backdrop.open { display: block; }

        /* ════════════════════════════════════════════════════
           Mobile layout  ≤ 640 px
        ════════════════════════════════════════════════════ */
        @media (max-width: 640px) {

            /* Fix iOS Safari 100vh + bouncing-bar bug */
            body {
                height: 100dvh;
                min-height: -webkit-fill-available;
            }

            /* Sidebar slides in as a drawer */
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 100;
                width: 80vw;
                max-width: 300px;
                transform: translateX(-110%);
                transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 6px 0 32px rgba(0,0,0,0.6);
            }
            .sidebar.open { transform: translateX(0); }

            /* Show hamburger button */
            .mobile-menu-btn { display: flex; }

            /* Player fills the screen */
            .player {
                padding: 16px 16px 20px;
                gap: 20px;
                overflow-y: auto;
            }

            /* Song title smaller */
            .song-title { font-size: 20px; }

            /* Status bar */
            .status-bar { font-size: 11px; }

            /* Controls stack vertically */
            .controls-row {
                flex-direction: column;
                gap: 22px;
                max-width: 100%;
            }
            .controls-divider { display: none; }

            /* Each section full-width */
            .control-section { width: 100%; }

            /* Bigger range sliders for thumbs */
            input[type=range] { height: 8px; border-radius: 4px; }
            input[type=range]::-webkit-slider-thumb {
                width: 24px;
                height: 24px;
            }

            /* Bigger transport buttons */
            .btn-play {
                width: 68px;
                height: 68px;
                font-size: 22px;
            }
            .btn-stop, .btn-loop {
                width: 46px;
                height: 46px;
                font-size: 16px;
            }

            /* Preset buttons easier to tap */
            .preset-btn {
                padding: 7px 13px;
                font-size: 12px;
            }

            /* Region time labels bigger on mobile */
            .region-time-in, .region-time-out { font-size: 12px; }

            /* Section labels */
            .section-label { font-size: 11px; }

            /* Scrub area */
            .scrub-section { max-width: 100%; }

            /* Time row */
            .time-row { font-size: 12px; }
        }

        /* ── Offline / cached indicator ── */
        .cache-badge {
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 8px;
            border: 1px solid #333;
            color: #555;
            flex-shrink: 0;
        }
        .cache-badge.cached  { border-color: #34d399; color: #34d399; }
        .cache-badge.offline { border-color: #f59e0b; color: #f59e0b; }

        /* ── Instrumental-only: vocal + pitch permanently disabled ── */
        .control-section.instr-only { opacity: 0.35; pointer-events: none; }
        .control-section.instr-only .section-label::after {
            content: ' — instrumental only';
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* ════════════════════════════════════════════════════
           Playlist UI
        ════════════════════════════════════════════════════ */
        .playlist-bar {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 10px;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
        }
        .playlist-select {
            flex: 1;
            background: #222;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 5px 6px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            min-width: 0;
        }
        .playlist-select:focus { border-color: #555; }
        .playlist-icon-btn {
            width: 26px;
            height: 26px;
            background: none;
            border: 1px solid #444;
            border-radius: 5px;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .playlist-icon-btn:hover { border-color: #777; color: #ccc; }
        #deletePlaylistBtn:hover { border-color: #cc3333; color: #ff5555; background: rgba(200,40,40,0.12); }
        .playlist-icon-btn.hidden { display: none; }

        .playlist-edit-bar {
            padding: 8px 10px;
            border-bottom: 1px solid #2c2c2e;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            background: #1a1a1c;
        }
        .playlist-name-input {
            width: 100%;
            background: #222;
            color: #ddd;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 6px 8px;
            font-size: 12px;
            outline: none;
        }
        .playlist-name-input:focus { border-color: #2c5f9e; }
        .playlist-edit-actions { display: flex; gap: 6px; }
        .playlist-save-btn {
            flex: 1;
            padding: 5px;
            background: #2c5f9e;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .playlist-save-btn:hover { background: #3a72b8; }
        .playlist-cancel-btn {
            flex: 1;
            padding: 5px;
            background: transparent;
            color: #666;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .playlist-cancel-btn:hover { color: #aaa; border-color: #555; }

        .song-item.playlist-check { display: flex; align-items: center; gap: 8px; }
        .song-item.playlist-check input[type=checkbox] {
            width: 14px; height: 14px; flex-shrink: 0; accent-color: #2c5f9e; cursor: pointer;
        }
        .song-item.playlist-check.checked {
            background: #1a3a5c; color: #fff; border-left-color: #2c5f9e;
        }

        .sidebar-bottom {
            padding: 8px 10px;
            border-top: 1px solid #2c2c2e;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }
        .sidebar-bottom-btn {
            width: 100%;
            padding: 7px;
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .sidebar-bottom-btn:hover { color: #fff; border-color: #888; }
        .sidebar-bottom-row { display: flex; gap: 5px; }
        .sidebar-bottom-btn-sm {
            flex: 1;
            padding: 6px;
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .sidebar-bottom-btn-sm:hover { color: #fff; border-color: #888; }

        /* ── Drag-to-reorder (playlist edit mode) ── */
        .drag-handle {
            cursor: grab;
            color: #444;
            font-size: 16px;
            padding-right: 6px;
            flex-shrink: 0;
            user-select: none;
            touch-action: none;
            line-height: 1;
        }
        .drag-handle:hover { color: #888; }
        .drag-handle:active { cursor: grabbing; }
        .song-item.dragging { opacity: 0.35; background: #1a1a1c; }
        .song-item.drag-over-top    { border-top: 2px solid #2c5f9e !important; }
        .song-item.drag-over-bottom { border-bottom: 2px solid #2c5f9e !important; }

        /* ── Vamp songs: tempo & pitch locked ── */
        .control-section.vamp-locked { opacity: 0.35; pointer-events: none; }
        .control-section.vamp-locked .section-label::after {
            content: ' — unavailable for vamp songs';
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* ── Vamp panel ── */
        .vamp-panel {
            width: 100%;
            max-width: 580px;
            background: #161618;
            border: 1px solid #2c2c2e;
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        .vamp-phase-track {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .vamp-phase-pill {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #444;

/**
* Main processing engine for pitch shifting, tempo adjustment, and rate transposition.
* Set pitch, tempo, rate, or pitchSemitones for real-time audio manipulation.
*/

	transposer;
	stretch;
	_inputBuffer;
	_intermediateBuffer;
	_outputBuffer;
	_rate;
	_tempo;
	virtualPitch;
	virtualRate;
	virtualTempo;
	/**
	* Creates a new SoundTouch processor instance.
	*/
	constructor() {
		this.transposer = new RateTransposer(false);
		this.stretch = new Stretch(false);
		this._inputBuffer = new FifoSampleBuffer();
		this._intermediateBuffer = new FifoSampleBuffer();
		this._outputBuffer = new FifoSampleBuffer();
		this._rate = 0;
		this._tempo = 0;
		this.virtualPitch = 1;
		this.virtualRate = 1;
		this.virtualTempo = 1;
		this.calculateEffectiveRateAndTempo();
	}
	clear() {
		this.transposer.clear();
		this.stretch.clear();
	}
	clone() {
		const result = new SoundTouch();
		result.rate = this.rate;
		result.tempo = this.tempo;
		return result;
	}
	get rate() {
		return this._rate;
	}
	set rate(rate) {
		this.virtualRate = rate;
		this.calculateEffectiveRateAndTempo();
	}
	set rateChange(rateChange) {
		this._rate = 1 + .01 * rateChange;
	}
	get tempo() {
		return this._tempo;
	}
	set tempo(tempo) {
		this.virtualTempo = tempo;
		this.calculateEffectiveRateAndTempo();
	}
	set tempoChange(tempoChange) {
		this.tempo = 1 + .01 * tempoChange;
	}
	set pitch(pitch) {
		this.virtualPitch = pitch;
		this.calculateEffectiveRateAndTempo();
	}
	set pitchOctaves(pitchOctaves) {
		this.pitch = Math.exp(.69314718056 * pitchOctaves);

	set pitchSemitones(pitchSemitones) {
		this.pitchOctaves = pitchSemitones / 12;

	get inputBuffer() {
		return this._inputBuffer;
	}
	get outputBuffer() {
		return this._outputBuffer;

		const previousTempo = this._tempo;
		const previousRate = this._rate;

// Fetch a URL as an ArrayBuffer. Uses XHR so it works on file:// as well as https://.
function fetchArrayBuffer(url) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.onload = () => {
            if (xhr.status === 200 || xhr.status === 0) {
                resolve(xhr.response);
            } else {
                reject(new Error('HTTP ' + xhr.status + ': ' + url));
            }
        };
        xhr.onerror = () => reject(new Error('Failed to load: ' + url));
        xhr.send();
    });
}

// AudioContext init — no worklet needed
// ══════════════════════════════════════════════════════════════════════════════
async function initAudioContext() {
    if (audioCtx) {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Master fade node sits between everything and the speakers
    masterFadeNode = audioCtx.createGain();
    masterFadeNode.gain.value = 1;
    masterFadeNode.connect(audioCtx.destination);
    // Vocal volume rides on top of the master fade
    vocalGainNode = audioCtx.createGain();
    vocalGainNode.gain.value = vocalLevel / 100;
    vocalGainNode.connect(masterFadeNode);
}

// Manifest loading — fetches songs.json from the same folder as this HTML file
// ══════════════════════════════════════════════════════════════════════════════
async function loadManifest() {
    const statusEl = document.getElementById('manifestStatus');
    const titleEl  = document.getElementById('showTitle');
    try {
        let data;
        try {
            const resp = await fetch('songs.json');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            data = await resp.json();
        } catch(fetchErr) {
            if (window.SONGS_DATA) {
                data = window.SONGS_DATA;
            } else {
                throw fetchErr;
            }
        }

        // Support both a plain array and { showTitle, songs: [...] }
        const songs     = Array.isArray(data) ? data : (data.songs || []);
        const showTitle = !Array.isArray(data) && data.showTitle ? data.showTitle : null;

        if (showTitle && titleEl) titleEl.textContent = showTitle;
        if (showTitle) document.title = showTitle;

        let cueCount = 0;
        libraryOrder = [];
        songs.forEach(song => {
            if (song.type === 'cue') {
                library[song.title] = { type: 'cue', src: song.src || null };
                cueCount++;
            } else {
                library[song.title] = {
                    vocal:    song.vocal    || null,
                    instr:    song.instr    || null,
                    vamp:     song.vamp     || null,
                    postVamp: song.postVamp || null,
                };
            }
            libraryOrder.push(song.title);
        });

        const songCount = songs.length - cueCount;
        if (statusEl) statusEl.textContent = songCount + ' song' + (songCount === 1 ? '' : 's') + (cueCount ? ', ' + cueCount + ' cue' + (cueCount === 1 ? '' : 's') : '');
        renderSongList();
        triggerPrefetch();   // start fetching durations in background
    } catch(err) {
        console.error('Manifest load error:', err);
        if (statusEl) {
            statusEl.textContent = 'Could not load songs.json';
            statusEl.classList.add('manifest-error');
        }
        const emptyEl = document.getElementById('emptyList');
        if (emptyEl) emptyEl.innerHTML = 'No songs loaded.<br><br>Place a <em>songs.json</em> file in the same folder as this HTML file.';
    }
}

// Song list
// ══════════════════════════════════════════════════════════════════════════════
function renderSongList() {
    const list = document.getElementById('songList');

    const allSongs = libraryOrder.filter(n => library[n] && library[n].instr);

    if (allSongs.length === 0) {
        list.innerHTML = '<div class="empty-list" id="emptyList">No songs found.</div>';
        return;
    }

    // ── Edit mode: songs with checkboxes + drag handles ─────────────────────────
    if (isEditingPlaylist) {
        const inPlaylist  = editingPlaylistName ? (playlists[editingPlaylistName] || []) : [];
        const inSet       = new Set(inPlaylist);
        // Show existing playlist songs first (in their saved order), then the rest
        const orderedSongs = [
            ...inPlaylist.filter(s => library[s]),
            ...allSongs.filter(s => !inSet.has(s))
        ];
        list.innerHTML = '';
        orderedSongs.forEach(name => {
            const checked = inSet.has(name);
            const div = document.createElement('div');
            div.className = 'song-item playlist-check' + (checked ? ' checked' : '');
            div.dataset.song = name;
            div.draggable = true;
            div.innerHTML = `<span class="drag-handle" title="Drag to reorder">⠿</span><input type="checkbox" class="song-check" data-song="${name.replace(/"/g,'&quot;')}" ${checked ? 'checked' : ''}><span class="song-label">${name}</span>`;
            div.addEventListener('click', e => {
                if (e.target.classList.contains('drag-handle') || e.target.tagName === 'INPUT') return;
                const cb = div.querySelector('input');
                cb.checked = !cb.checked;
                div.classList.toggle('checked', cb.checked);
            });
            // ── HTML5 drag ──
            div.addEventListener('dragstart', onDragStart);
            div.addEventListener('dragover',  onDragOver);
            div.addEventListener('dragleave', onDragLeave);
            div.addEventListener('drop',      onDrop);
            div.addEventListener('dragend',   onDragEnd);
            // ── Touch drag (mobile) ──
            const handle = div.querySelector('.drag-handle');
            handle.addEventListener('touchstart', onTouchDragStart, { passive: false });
            list.appendChild(div);
        });
        return;
    }

    // ── Normal mode ───────────────────────────────────────────────────────────
    let displaySongs = allSongs;
    if (playMode === 'showcues') {
        // Show W/Cues: full list including cues in JSON/script order
        displaySongs = libraryOrder.filter(n => library[n]);
    } else if (activePlaylist !== 'all' && playlists[activePlaylist]) {
        displaySongs = playlists[activePlaylist].filter(s => library[s]);
        if (displaySongs.length === 0) {
            list.innerHTML = '<div class="empty-list">Playlist is empty.<br>Tap ✎ to add songs.</div>';
            return;
        }
    }

    list.innerHTML = '';
    displaySongs.forEach(name => {
        const div = document.createElement('div');
        const isCue = library[name] && library[name].type === 'cue';
        const hasSaved = !isCue && activePlaylist !== 'all' && hasSavedSettings(activePlaylist, name);
        div.className = 'song-item' + (name === currentSong ? ' active' : '') + (hasSaved ? ' has-settings' : '') + (isCue ? ' is-cue' : '');
        div.textContent = name;
        div.title = isCue ? name + ' — music cue' : (hasSaved ? name + ' — has saved settings for this playlist' : name);
        div.addEventListener('click', () => selectSong(name));
        list.appendChild(div);
    });
}

// ══════════════════════════════════════════════════════════════════════════════
// Select & decode a song
// ══════════════════════════════════════════════════════════════════════════════
async function selectSong(name) {
    if (name === currentSong) return;
    const myGen = ++loadGeneration;   // any older in-flight load will see a mismatched gen and abort
    closeSidebar();
    // Save current settings to session memory before leaving (keyed per playlist)
    if (currentSong) {
        sessionMemory[sessionKey(activePlaylist, currentSong)] = {
            tempo:     Math.round(tempoRatio * 100),
            pitch:     pitchSemitones,
            vocal:     vocalLevel,
            regionIn:  regionInFrac,
            regionOut: regionOutFrac,
        };
    }
    stopNodes();
    isPlaying = false;
    startOffset = 0;
    // Clear stale audio buffers immediately so spacebar / show-ready glow cannot
    // fire against the previous song's audio while the new song is loading.
    instrBuffer = null;
    vocalBuffer = null;
    instrReady  = null;
    vocalReady  = null;
    currentSong = name;
    isCueSong  = library[name].type === 'cue';
    hasVocal   = !isCueSong && !!(library[name].vocal);   // must be set before renderPlayer()
    isVampSong = !isCueSong && !!(library[name].vamp && library[name].postVamp);
    cueLoopActive = false;        // loop off by default; board op enables if needed
    // Reset vamp state from any previous song
    vampPhase = null; postVampQueued = false;
    vampInstrBuf = vampVocalBuf = postVampInstrBuf = postVampVocalBuf = null;
    // Apply settings: defaults → session memory → saved playlist settings
    applySongSettings(name);

    document.querySelectorAll('.song-item').forEach(el => {
        el.classList.toggle('active', el.textContent === name);
    });

    renderPlayer();
    setStatus('Loading...');
    setPlayEnabled(false);

    try {
        await initAudioContext();
        if (loadGeneration !== myGen) return;   // a newer song was selected while we awaited
        // Sync vocal gain node to this song's saved/default level — initAudioContext() only sets
        // it on first call; subsequent songs need an explicit update here.
        if (vocalGainNode) vocalGainNode.gain.value = vocalLevel / 100;

        if (isCueSong) {
            instrBuffer = await audioCtx.decodeAudioData(await fetchArrayBuffer(library[name].src));
            vocalBuffer = null;
        } else if (hasVocal) {
            const [instrArr, vocalArr] = await Promise.all([
                fetchArrayBuffer(library[name].instr),
                fetchArrayBuffer(library[name].vocal)
            ]);
            [instrBuffer, vocalBuffer] = await Promise.all([
                audioCtx.decodeAudioData(instrArr),
                audioCtx.decodeAudioData(vocalArr)
            ]);
        } else {
            instrBuffer = await audioCtx.decodeAudioData(await fetchArrayBuffer(library[name].instr));
            vocalBuffer = null;
        }

        instrReady = null;
        vocalReady = null;
        lastProcessedTempo = null;
        lastProcessedPitch = null;

        // Load vamp + Part 3 buffers if this is a vamp song
        if (isVampSong) {
            setStatus('Loading vamp sections…');
            const v  = library[name].vamp;
            const pv = library[name].postVamp;
            const vampHasV = hasVocal && !!(v.vocal);
            const postHasV = hasVocal && !!(pv.vocal);
            const urlList = [v.instr, pv.instr,
                ...(vampHasV ? [v.vocal]  : []),
                ...(postHasV ? [pv.vocal] : [])];
            const arrs    = await Promise.all(urlList.map(u => fetchArrayBuffer(u)));
            const decoded = await Promise.all(arrs.map(a => audioCtx.decodeAudioData(a)));
            vampInstrBuf    = decoded[0];
            postVampInstrBuf = decoded[1];
            let idx = 2;
            vampVocalBuf    = vampHasV ? decoded[idx++] : null;
            postVampVocalBuf = postHasV ? decoded[idx]  : null;
        }

        if (loadGeneration !== myGen) return;   // superseded — discard these buffers
        setStatus('');
        setPlayEnabled(true);
        updateDurationDisplay(instrBuffer.duration);
        updateProgressUI(0);
        updateShowCounter();
        syncShowReady();

    } catch(err) {
        if (loadGeneration !== myGen) return;   // stale error — ignore silently
        setStatus('Error loading file.');
        console.error('Load error:', err);
    }
}

// ══════════════════════════════════════════════════════════════════════════════
// SoundTouch processing — runs in main thread, no AudioWorklet needed
// ══════════════════════════════════════════════════════════════════════════════
async function processBuffersIfNeeded() {
    if (tempoRatio === lastProcessedTempo && pitchSemitones === lastProcessedPitch && instrReady && (!hasVocal || vocalReady)) return;

    if (tempoRatio === 1.0 && pitchSemitones === 0) {
        instrReady = instrBuffer;
        vocalReady = hasVocal ? vocalBuffer : null;
        lastProcessedTempo = 1.0;
        lastProcessedPitch = 0;
        return;
    }

    setStatus('Processing...');
    try {
        // Process sequentially to avoid memory spike on large files
        instrReady = await processOneBuffer(instrBuffer, tempoRatio, pitchSemitones);
        vocalReady = hasVocal ? await processOneBuffer(vocalBuffer, tempoRatio, pitchSemitones) : null;
        lastProcessedTempo = tempoRatio;
        lastProcessedPitch = pitchSemitones;
        setStatus('');
    } catch(err) {
        setStatus('Processing error.');
        console.error('Process error:', err);
        throw err;
    }
}

async function processOneBuffer(buffer, ratio, semitones) {
    const sr = buffer.sampleRate;
    const numFrames = buffer.length;

    // Get stereo channel data
    const left  = buffer.getChannelData(0);
    const right = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : buffer.getChannelData(0);

    // Create SoundTouch instance
    const st = new SoundTouch();
    st.tempo = ratio;
    if (semitones !== 0) st.pitchSemitones = semitones;

    // Process in chunks so the browser stays responsive
    const CHUNK = 8192;
    const outputChunks = [];
    let inputPos = 0;

    while (inputPos < numFrames) {
        const count = Math.min(CHUNK, numFrames - inputPos);

        // Interleave L/R into SoundTouch input buffer
        const samples = new Float32Array(count * 2);
        for (let i = 0; i < count; i++) {
            samples[i * 2]     = left[inputPos + i];
            samples[i * 2 + 1] = right[inputPos + i];
        }
        st.inputBuffer.putSamples(samples, 0, count);
        st.process();

        const avail = st.outputBuffer.frameCount;
        if (avail > 0) {
            const out = new Float32Array(avail * 2);
            st.outputBuffer.receiveSamples(out, avail);
            outputChunks.push(out);
        }

        inputPos += count;

        // Yield to UI thread every ~10 chunks
        if ((inputPos / CHUNK) % 10 === 0) {
            await new Promise(r => setTimeout(r, 0));
        }
    }

    // Flush SoundTouch's internal buffers
    for (let flush = 0; flush < 5; flush++) {
        st.process();
        const avail = st.outputBuffer.frameCount;
        if (avail > 0) {
            const out = new Float32Array(avail * 2);
            st.outputBuffer.receiveSamples(out, avail);
            outputChunks.push(out);
        } else break;
    }

    // Assemble output AudioBuffer
    const totalFrames = outputChunks.reduce((sum, c) => sum + c.length / 2, 0);
    const outBuf = audioCtx.createBuffer(2, Math.ceil(totalFrames), sr);
    const outL = new Float32Array(Math.ceil(totalFrames));
    const outR = new Float32Array(Math.ceil(totalFrames));

    let offset = 0;
    for (const chunk of outputChunks) {
        const frames = chunk.length / 2;
        for (let i = 0; i < frames; i++) {
            outL[offset + i] = chunk[i * 2];
            outR[offset + i] = chunk[i * 2 + 1];
        }
        offset += frames;
    }
    outBuf.copyToChannel(outL, 0);
    outBuf.copyToChannel(outR, 1);

    return outBuf;
}

// ══════════════════════════════════════════════════════════════════════════════
// Playback
// ══════════════════════════════════════════════════════════════════════════════
async function startPlayback() {
    if (!instrBuffer) return;
    await initAudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    setPlayEnabled(false);
    await processBuffersIfNeeded();
    setPlayEnabled(true);

    // If region is active, keep start within the region (applying pre-roll if eligible)
    if (regionIsActive() && instrBuffer) {
        const inTime  = regionInFrac  * instrBuffer.duration;
        const outTime = regionOutFrac * instrBuffer.duration;
        if (startOffset < inTime || startOffset >= outTime) {
            startOffset = preRollStart(inTime);
        }
    }

    const processedOffset = startOffset / tempoRatio;

    instrNode = audioCtx.createBufferSource();
    instrNode.buffer = instrReady;
    instrNode.connect(masterFadeNode);   // instr → master fade → destination

    if (hasVocal && vocalReady) {
        vocalNode = audioCtx.createBufferSource();
        vocalNode.buffer = vocalReady;
        vocalNode.connect(vocalGainNode);  // vocal → vocal gain → master fade → destination
    }

    // Schedule fade-in if we started before the region IN point (pre-roll)
    const inTime = regionIsActive() ? regionInFrac * instrBuffer.duration : -1;
    masterFadeNode.gain.cancelScheduledValues(audioCtx.currentTime);
    if (regionIsActive() && loopRegion && startOffset < inTime - 0.05) {
        const fadeDuration = inTime - startOffset;
        masterFadeNode.gain.setValueAtTime(0, audioCtx.currentTime);
        masterFadeNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + fadeDuration);
    } else {
        masterFadeNode.gain.setValueAtTime(1, audioCtx.currentTime);
    }

    instrNode.start(0, processedOffset);
    if (vocalNode) vocalNode.start(0, processedOffset);

    instrNode.onended = onTrackEnded;

    startCtxTime = audioCtx.currentTime;
    isPlaying = true;
    setPlayButton(true);
    setTransportLocked(true);
    tickProgress();
}

function pausePlayback() {
    startOffset = getCurrentOriginalTime();
    stopNodes();
    isPlaying = false;
    setPlayButton(false);
    setTransportLocked(false);
}

function stopAndRewind() {
    stopNodes();
    isPlaying = false;
    postVampQueued = false;
    // Restore master gain if a cue fade was in progress
    if (masterFadeNode) {
        masterFadeNode.gain.cancelScheduledValues(audioCtx.currentTime);
        masterFadeNode.gain.setValueAtTime(1, audioCtx.currentTime);
    }
    if (isVampSong) {
        vampPhase = null;
        startOffset = 0;
        updateVampPanel();
        updateDurationDisplay(instrBuffer ? instrBuffer.duration : 0);
        updateProgressUI(0);
    } else {
        const rewindFrac = (regionIsActive() && instrBuffer) ? regionInFrac : 0;
        startOffset = rewindFrac * (instrBuffer ? instrBuffer.duration : 0);
        updateProgressUI(rewindFrac);
    }
    setPlayButton(false);
    setTransportLocked(false);
}

function stopNodes() {
    cancelAnimationFrame(animFrame);
    if (instrNode)     { instrNode.onended     = null; try { instrNode.stop();     } catch(e) {} try { instrNode.disconnect();     } catch(e) {} instrNode     = null; }
    if (vocalNode)     { vocalNode.onended     = null; try { vocalNode.stop();     } catch(e) {} try { vocalNode.disconnect();     } catch(e) {} vocalNode     = null; }
    if (vampInstrNode) { vampInstrNode.onended = null; try { vampInstrNode.stop(); } catch(e) {} try { vampInstrNode.disconnect(); } catch(e) {} vampInstrNode = null; }
    if (vampVocalNode) { vampVocalNode.onended = null; try { vampVocalNode.stop(); } catch(e) {} try { vampVocalNode.disconnect(); } catch(e) {} vampVocalNode = null; }
}

function onTrackEnded() {
    if (!isPlaying) return;
    // Cue loop: restart instead of advancing to next item
    if (isCueSong && cueLoopActive) {
        stopNodes();
        isPlaying = false;
        startOffset = 0;
        startPlayback();
        return;
    }
    stopNodes();
    isPlaying = false;
    startOffset = 0;
    setPlayButton(false);
    setTransportLocked(false);
    updateProgressUI(0);
    autoCueNext();
}

// Fade the cue out gracefully, then advance to the next item.
function fadeCueOut() {
    if (!masterFadeNode) return;
    const FADE = 2.5;  // seconds
    masterFadeNode.gain.cancelScheduledValues(audioCtx.currentTime);
    masterFadeNode.gain.setValueAtTime(masterFadeNode.gain.value, audioCtx.currentTime);
    masterFadeNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + FADE);
    const fadeStartSong = currentSong;
    setTimeout(() => {
        if (currentSong !== fadeStartSong) return;   // user already moved on
        stopNodes();
        isPlaying = false;
        startOffset = 0;
        // Restore master gain for next song
        if (masterFadeNode) {
            masterFadeNode.gain.cancelScheduledValues(audioCtx.currentTime);
            masterFadeNode.gain.setValueAtTime(1, audioCtx.currentTime);
        }
        setPlayButton(false);
        setTransportLocked(false);
        updateProgressUI(0);
        autoCueNext();
    }, (FADE + 0.15) * 1000);
}

// Toggle cue loop on/off from the cue player UI
function toggleCueLoop() {
    cueLoopActive = !cueLoopActive;
    const btn   = document.getElementById('cueLoopBtn');
    const label = document.getElementById('cueLoopLabel');
    if (btn)   btn.classList.toggle('loop-active', cueLoopActive);
    if (label) { label.textContent = cueLoopActive ? 'Loop On' : 'Loop Off'; label.className = 'cue-loop-label' + (cueLoopActive ? ' loop-on' : ''); }
}

// ══════════════════════════════════════════════════════════════════════════════
// Vamp playback engine
// ══════════════════════════════════════════════════════════════════════════════
async function startVampSongPlayback() {
    if (!instrBuffer || !vampInstrBuf || !postVampInstrBuf) return;
    await initAudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    setPlayEnabled(false);

    // Part 1 — use raw buffers (no SoundTouch for vamp songs)
    instrNode = audioCtx.createBufferSource();
    instrNode.buffer = instrBuffer;
    instrNode.connect(masterFadeNode);

    if (hasVocal && vocalBuffer) {
        vocalNode = audioCtx.createBufferSource();
        vocalNode.buffer = vocalBuffer;
        vocalNode.connect(vocalGainNode);
    }

    masterFadeNode.gain.cancelScheduledValues(audioCtx.currentTime);
    masterFadeNode.gain.setValueAtTime(1, audioCtx.currentTime);

    instrNode.start(0, startOffset);
    if (vocalNode) vocalNode.start(0, startOffset);

    instrNode.onended = onPart1Ended;

    startCtxTime = audioCtx.currentTime;
    isPlaying    = true;
    vampPhase    = 'pt1';
    setPlayButton(true);
    setPlayEnabled(true);
    setTransportLocked(false);   // tempo/pitch locked via CSS, not JS, for vamp songs
    updateVampPanel();
    updateDurationDisplay(instrBuffer.duration);
    tickVampProgress();
}

function onPart1Ended() {
    if (!isPlaying) return;
    // Clean up Part 1 nodes
    if (vocalNode) { try { vocalNode.disconnect(); } catch(e) {} vocalNode = null; }
    instrNode = null;
    startVampLoop();
}

function startVampLoop() {
    vampInstrNode = audioCtx.createBufferSource();
    vampInstrNode.buffer = vampInstrBuf;
    vampInstrNode.loop   = true;

    vampInstrGain = audioCtx.createGain();
    vampInstrGain.gain.value = 1;
    vampInstrNode.connect(vampInstrGain);
    vampInstrGain.connect(masterFadeNode);

    if (hasVocal && vampVocalBuf) {
        vampVocalNode = audioCtx.createBufferSource();
        vampVocalNode.buffer = vampVocalBuf;
        vampVocalNode.loop   = true;
        vampVocalGain = audioCtx.createGain();
        vampVocalGain.gain.value = 1;
        vampVocalNode.connect(vampVocalGain);
        vampVocalGain.connect(vocalGainNode);
    }

    const now = audioCtx.currentTime;
    vampInstrNode.start(now);
    if (vampVocalNode) vampVocalNode.start(now);

    vampLoopStartedAt = now;
    vampDuration      = vampInstrBuf.duration;
    vampPhase         = 'vamp';
    postVampQueued    = false;

    // Disable play button during vamp — only Stop and advance buttons active
    setPlayButton(true);
    setPlayEnabled(false);
    updateVampPanel();
    updateDurationDisplay(vampDuration);
}

function finishLoop() {
    if (postVampQueued || vampPhase !== 'vamp') return;
    postVampQueued = true;

    const now         = audioCtx.currentTime;
    const elapsed     = (now - vampLoopStartedAt) % vampDuration;
    const remaining   = vampDuration - elapsed;
    const transition  = now + remaining;

    vampInstrNode.stop(transition);
    if (vampVocalNode) vampVocalNode.stop(transition);

    schedulePostVamp(transition, 0);

    const finBtn = document.getElementById('vampFinishBtn');
    const goBtn  = document.getElementById('vampGoNowBtn');
    if (finBtn) { finBtn.textContent = 'Advancing after this pass…'; finBtn.disabled = true; }
    if (goBtn)  goBtn.style.display = 'none';
}

function goNow() {
    if (postVampQueued || vampPhase !== 'vamp') return;
    postVampQueued = true;

    const now       = audioCtx.currentTime;
    const elapsed   = (now - vampLoopStartedAt) % vampDuration;
    const remaining = vampDuration - elapsed;

    const goBtn  = document.getElementById('vampGoNowBtn');
    const finBtn = document.getElementById('vampFinishBtn');

    if (remaining <= 2.0) {
        // ≤2 s left in this pass — wait for natural loop end (sounds clean)
        const transition = now + remaining;
        vampInstrNode.stop(transition);
        if (vampVocalNode) vampVocalNode.stop(transition);
        schedulePostVamp(transition, 0);

        if (goBtn)  { goBtn.textContent = 'Advancing…'; goBtn.disabled = true; }
        if (finBtn) finBtn.style.display = 'none';
    } else {
        // >2 s left — crossfade into Part 3
        const FADE = VAMP_CROSSFADE;

        // Fade vamp out
        vampInstrGain.gain.setValueAtTime(vampInstrGain.gain.value, now);
        vampInstrGain.gain.linearRampToValueAtTime(0, now + FADE);
        if (vampVocalGain) {
            vampVocalGain.gain.setValueAtTime(vampVocalGain.gain.value, now);
            vampVocalGain.gain.linearRampToValueAtTime(0, now + FADE);
        }
        vampInstrNode.stop(now + FADE);
        if (vampVocalNode) vampVocalNode.stop(now + FADE);

        // Start Part 3 with fade-in
        schedulePostVamp(now, FADE);

        if (goBtn)  { goBtn.textContent = 'Going…'; goBtn.disabled = true; }
        if (finBtn) finBtn.style.display = 'none';
    }
}

function schedulePostVamp(startTime, fadeInDuration) {
    // ── Part 3 instr ──
    const pt3InstrSrc  = audioCtx.createBufferSource();
    pt3InstrSrc.buffer = postVampInstrBuf;
    const pt3InstrGain = audioCtx.createGain();
    if (fadeInDuration > 0) {
        pt3InstrGain.gain.setValueAtTime(0, startTime);
        pt3InstrGain.gain.linearRampToValueAtTime(1, startTime + fadeInDuration);
    } else {
        pt3InstrGain.gain.setValueAtTime(1, startTime);
    }
    pt3InstrSrc.connect(pt3InstrGain);
    pt3InstrGain.connect(masterFadeNode);
    pt3InstrSrc.start(startTime);
    pt3InstrSrc.onended = onPart3Ended;
    instrNode = pt3InstrSrc;   // store for stopNodes()

    // ── Part 3 vocal ──
    if (hasVocal && postVampVocalBuf) {
        const pt3VocalSrc  = audioCtx.createBufferSource();
        pt3VocalSrc.buffer = postVampVocalBuf;
        const pt3VocalGain = audioCtx.createGain();
        if (fadeInDuration > 0) {
            pt3VocalGain.gain.setValueAtTime(0, startTime);
            pt3VocalGain.gain.linearRampToValueAtTime(1, startTime + fadeInDuration);
        } else {
            pt3VocalGain.gain.setValueAtTime(1, startTime);
        }
        pt3VocalSrc.connect(pt3VocalGain);
        pt3VocalGain.connect(vocalGainNode);
        pt3VocalSrc.start(startTime);
        vocalNode = pt3VocalSrc;
    }

    // Transition to pt2 phase when Part 3 actually begins
    pt3StartedAt = startTime;
    const delay = Math.max(0, (startTime - audioCtx.currentTime) * 1000);
    setTimeout(() => {
        if (!isPlaying) return;
        vampPhase    = 'pt2';
        startCtxTime = pt3StartedAt;
        startOffset  = 0;
        updateVampPanel();
        setPlayEnabled(true);   // re-enable play/pause for Part 3
        updateDurationDisplay(postVampInstrBuf.duration);
    }, delay);
}

function onPart3Ended() {
    if (!isPlaying) return;
    stopNodes();
    isPlaying  = false;
    vampPhase  = null;
    startOffset = 0;
    setPlayButton(false);
    updateVampPanel();
    updateProgressUI(0);
    updateDurationDisplay(instrBuffer.duration);
    autoCueNext();
}

// ── Vamp progress ticker ──────────────────────────────────────────────────────
function tickVampProgress() {
    if (!isPlaying) return;
    if (!isScrubbing) {
        if (vampPhase === 'pt1' && instrBuffer) {
            const t    = startOffset + (audioCtx.currentTime - startCtxTime);
            const frac = Math.min(1, t / instrBuffer.duration);
            const scrub = document.getElementById('scrubBar');
            const cur   = document.getElementById('timeCurrent');
            if (scrub) { scrub.value = frac * 1000; updateScrubFill(); }
            if (cur)   cur.textContent = formatTime(t);

        } else if (vampPhase === 'vamp' && vampDuration) {
            const elapsed = (audioCtx.currentTime - vampLoopStartedAt) % vampDuration;
            const frac    = Math.min(1, elapsed / vampDuration);
            const scrub = document.getElementById('scrubBar');
            const cur   = document.getElementById('timeCurrent');
            if (scrub) { scrub.value = frac * 1000; updateScrubFill(); }
            if (cur)   cur.textContent = formatTime(elapsed);

        } else if (vampPhase === 'pt2' && postVampInstrBuf) {
            const t    = audioCtx.currentTime - startCtxTime;
            const frac = Math.min(1, t / postVampInstrBuf.duration);
            const scrub = document.getElementById('scrubBar');
            const cur   = document.getElementById('timeCurrent');
            if (scrub) { scrub.value = frac * 1000; updateScrubFill(); }
            if (cur)   cur.textContent = formatTime(t);
        }
    }
    maybeUpdateThermometer();
    animFrame = requestAnimationFrame(tickVampProgress);
}

// ── Update the vamp panel phase pills and cue area ────────────────────────────
function updateVampPanel() {
    const pt1El  = document.getElementById('vampPhasePt1');
    const vampEl = document.getElementById('vampPhaseVamp');
    const pt2El  = document.getElementById('vampPhasePt2');
    const cueEl  = document.getElementById('vampCueArea');
    if (!pt1El) return;   // player not rendered yet

    pt1El.classList.toggle('current',  vampPhase === 'pt1');
    vampEl.classList.toggle('current', vampPhase === 'vamp');
    pt2El.classList.toggle('current',  vampPhase === 'pt2');

    if (cueEl) cueEl.style.display = (vampPhase === 'vamp') ? 'flex' : 'none';

    // Play button: disabled during vamp loop, enabled otherwise
    const playBtn = document.getElementById('playBtn');
    if (playBtn) playBtn.disabled = (vampPhase === 'vamp');
}

function togglePlay() {
    if (isVampSong) {
        if (vampPhase === 'vamp') return;   // buttons disabled during vamp loop
        isPlaying ? pausePlayback() : startVampSongPlayback();
    } else {
        isPlaying ? pausePlayback() : startPlayback();
    }
}

// ══════════════════════════════════════════════════════════════════════════════
// Time tracking
// ══════════════════════════════════════════════════════════════════════════════
function getCurrentOriginalTime() {
    if (!isPlaying) return startOffset;
    return startOffset + (audioCtx.currentTime - startCtxTime) * tempoRatio;
}

// ══════════════════════════════════════════════════════════════════════════════
// Scrubbing
// ══════════════════════════════════════════════════════════════════════════════
function onScrubInput(e) {
    const frac = parseFloat(e.target.value) / 1000;
    const cur  = document.getElementById('timeCurrent');
    if (cur && instrBuffer) cur.textContent = formatTime(frac * instrBuffer.duration);
    updateScrubFill();
}

function onScrubRelease(e) {
    isScrubbing = false;
    seekToFraction(parseFloat(e.target.value) / 1000);
}

async function seekToFraction(frac) {
    if (!instrBuffer) return;
    const wasPlaying = isPlaying;
    stopNodes();
    isPlaying = false;
    startOffset = frac * instrBuffer.duration;
    if (wasPlaying) {
        await startPlayback();
    } else {
        updateProgressUI(frac);
    }
}

// ══════════════════════════════════════════════════════════════════════════════
// Progress animation
// ══════════════════════════════════════════════════════════════════════════════
function tickProgress() {
    if (!isPlaying) return;
    if (!isScrubbing && instrBuffer) {
        const currentTime = getCurrentOriginalTime();
        const duration    = instrBuffer.duration;

        // Region end: loop back to IN (with pre-roll), or stop and rewind
        if (regionIsActive() && currentTime >= regionOutFrac * duration) {
            stopNodes();
            isPlaying = false;
            const inTime = regionInFrac * duration;
            startOffset = loopRegion ? preRollStart(inTime) : inTime;
            setPlayButton(false);
            setTransportLocked(false);
            if (loopRegion) {
                startPlayback();
            } else {
                updateProgressUI(regionInFrac);
            }
            return;
        }

        const frac = Math.min(1, currentTime / duration);
        updateProgressUI(frac);
    }
    maybeUpdateThermometer();
    animFrame = requestAnimationFrame(tickProgress);
}

function updateProgressUI(frac) {
    const scrub = document.getElementById('scrubBar');
    const cur   = document.getElementById('timeCurrent');
    if (!scrub || !cur || !instrBuffer) return;
    scrub.value = frac * 1000;
    cur.textContent = formatTime(frac * instrBuffer.duration);
    updateScrubFill();
}

function updateDurationDisplay(dur) {
    const el = document.getElementById('timeTotal');
    if (el) el.textContent = formatTime(dur || 0);
    updateRegionDisplay(); // refresh OUT label now we know duration
}

// Vocal volume

// ── Settings indicator ────────────────────────────────────────────────────────
function updateSettingsIndicator() {
    const el = document.getElementById('settingsIndicator');
    if (!el) return;
    const parts = [];
    const tempoDisplay = Math.round(tempoRatio * 100);
    if (tempoDisplay !== 100) parts.push(tempoDisplay + '% tempo');
    if (pitchSemitones !== 0) parts.push((pitchSemitones > 0 ? '+' : '') + pitchSemitones + ' semitone' + (Math.abs(pitchSemitones) > 1 ? 's' : ''));
    if (vocalLevel === 0)        parts.push('vocals off');
    else if (vocalLevel < 100)   parts.push('vocals ' + vocalLevel + '%');
    el.textContent = parts.length > 0 ? '⚙  ' + parts.join('  ·  ') : '';
}

function onVocalSlider(e) {
    vocalLevel = parseFloat(e.target.value);
    document.getElementById('vocalValue').textContent = vocalLevel + '%';
    if (vocalGainNode) vocalGainNode.gain.value = vocalLevel / 100;
    updateVocalFill();

    updateSettingsIndicator();

}

function setVocalPreset(level) {

}

// Emergency vocal nudge — keyboard shortcut for live performance only.
// -/_ drops vocal 30%; =/+ raises it 30%. Works mid-vamp.
// Intentionally does NOT auto-save — this is a panic button, not a settings change.
// Use the slider to permanently set vocal levels.
function nudgeVocalLevel(delta) {
    vocalLevel = Math.max(0, Math.min(100, vocalLevel + delta));
    const s = document.getElementById('vocalSlider');
    const v = document.getElementById('vocalValue');
    if (s) s.value = vocalLevel;
    if (v) v.textContent = vocalLevel + '%';
    if (vocalGainNode) vocalGainNode.gain.value = vocalLevel / 100;

    updatePresetButtons();

}

// Loop Region

function clearRegion() {
    regionInFrac  = 0;
    regionOutFrac = 1;
    updateRegionBar();
    updateRegionDisplay();
    autoSaveCurrentSongSettings();
}

// Paint the region bar track and position the IN/OUT dots.
function updateRegionBar() {
    const track  = document.getElementById('regionBarTrack');
    const dotIn  = document.getElementById('regionDotIn');
    const dotOut = document.getElementById('regionDotOut');
    if (!track) return;
    const inPct  = (regionInFrac  * 100).toFixed(2);
    const outPct = (regionOutFrac * 100).toFixed(2);
    if (regionIsActive()) {
        track.style.background =
            `linear-gradient(to right, #2a2a2c 0% ${inPct}%, #0d2a1a ${inPct}%, #34d399 ${inPct}% ${outPct}%, #2a2a2c ${outPct}% 100%)`;
    } else {
        track.style.background = '#2a2a2c';
    }
    if (dotIn)  dotIn.style.left  = inPct  + '%';
    if (dotOut) dotOut.style.left = outPct + '%';
}

function updateRegionDisplay() {
    const inEl  = document.getElementById('regionInTime');
    const outEl = document.getElementById('regionOutTime');
    const lbl   = document.getElementById('regionLabel');
    if (!inEl || !outEl) return;
    const duration = instrBuffer ? instrBuffer.duration : 0;
    inEl.textContent  = formatTime(regionInFrac  * duration);
    outEl.textContent = formatTime(regionOutFrac * duration);
    const active = regionIsActive();
    inEl.classList.toggle('dim',  regionInFrac  < 0.001);
    outEl.classList.toggle('dim', regionOutFrac > 0.999);
    if (lbl) {
        lbl.textContent = active ? '◁  LOOP REGION  ▷' : '── FULL TRACK ──';
        lbl.classList.toggle('active', active);
    }
}

// ── Region bar drag handling ──────────────────────────────────────────────────
function onRegionBarMouseDown(e) {
    const dotIn  = document.getElementById('regionDotIn');
    const dotOut = document.getElementById('regionDotOut');
    if (e.target === dotIn) {
        regionDragging = 'in';
        dotIn.classList.add('grabbing');
    } else if (e.target === dotOut) {
        regionDragging = 'out';
        dotOut.classList.add('grabbing');
    } else {
        // Click on bar: move nearest dot
        const wrap = document.getElementById('regionBarWrap');
        const rect = wrap.getBoundingClientRect();
        const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const distIn  = Math.abs(frac - regionInFrac);
        const distOut = Math.abs(frac - regionOutFrac);
        if (distIn <= distOut) {
            regionInFrac = Math.min(frac, regionOutFrac - 0.01);
            regionDragging = 'in';
        } else {
            regionOutFrac = Math.max(frac, regionInFrac + 0.01);
            regionDragging = 'out';
        }
        updateRegionBar();
        updateRegionDisplay();
    }
    e.preventDefault();
}

function onRegionBarTouchStart(e) {
    const touch = e.touches[0];
    const dotIn  = document.getElementById('regionDotIn');
    const dotOut = document.getElementById('regionDotOut');
    if (e.target === dotIn)       regionDragging = 'in';
    else if (e.target === dotOut) regionDragging = 'out';
    else {
        const wrap = document.getElementById('regionBarWrap');
        const rect = wrap.getBoundingClientRect();
        const frac = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
        regionDragging = Math.abs(frac - regionInFrac) <= Math.abs(frac - regionOutFrac) ? 'in' : 'out';
        if (regionDragging === 'in')  regionInFrac  = Math.min(frac, regionOutFrac - 0.01);
        else                          regionOutFrac = Math.max(frac, regionInFrac  + 0.01);
        updateRegionBar(); updateRegionDisplay();
    }
    e.preventDefault();
}

function regionBarDragMove(clientX) {
    if (!regionDragging) return;
    const wrap = document.getElementById('regionBarWrap');
    if (!wrap) { regionDragging = null; return; }
    const rect = wrap.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    if (regionDragging === 'in')  regionInFrac  = Math.min(frac, regionOutFrac - 0.01);
    else                          regionOutFrac = Math.max(frac, regionInFrac  + 0.01);
    updateRegionBar();
    updateRegionDisplay();
}

document.addEventListener('mousemove', e => { if (regionDragging) regionBarDragMove(e.clientX); });
document.addEventListener('touchmove', e => { if (regionDragging) { regionBarDragMove(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
document.addEventListener('mouseup',   () => {
    if (!regionDragging) return;
    const dot = document.getElementById(regionDragging === 'in' ? 'regionDotIn' : 'regionDotOut');
    if (dot) dot.classList.remove('grabbing');
    regionDragging = null;
    autoSaveCurrentSongSettings();
});
document.addEventListener('touchend',  () => {
    if (regionDragging) { regionDragging = null; autoSaveCurrentSongSettings(); }
});
