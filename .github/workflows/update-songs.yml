name: Regenerate songs.json

on:
  push:
    paths:
      - 'audio/**'          # any MP3 added, removed, or renamed
      - 'generate_songs.py' # or if the script itself changes

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run generate_songs.py
        run: python3 generate_songs.py

      - name: Commit updated songs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add songs.json
          git diff --cached --quiet || git commit -m "chore: regenerate songs.json [skip ci]"
          git push
